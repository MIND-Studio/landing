<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" width="840" height="420" role="img" aria-label="What your AI assistant has learned about you — your preferences, an allergy to flag, a hobby — is kept in your space, not the AI company's. You can switch to a different assistant whenever you like and it still knows you.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1411"/>
      <stop offset="1" stop-color="#0a0f0d"/>
    </linearGradient>
    <linearGradient id="em" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#6ee7b7"/>
    </linearGradient>
    <radialGradient id="emglow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .h  { font-family:-apple-system,system-ui,'Segoe UI',Helvetica,sans-serif; font-weight:600; }
      .b  { font-family:-apple-system,system-ui,'Segoe UI',Helvetica,sans-serif; font-weight:400; }
      .lbl{ font-family:-apple-system,system-ui,'Segoe UI',Helvetica,sans-serif; font-weight:500; }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="839" height="419" rx="20" fill="url(#bg)" stroke="#1b241f"/>

  <!-- LEFT: swappable assistants -->
  <text x="44" y="74" class="h" font-size="15" fill="#9fb0a6">Your assistant</text>

  <!-- active assistant -->
  <g>
    <rect x="44" y="92" width="232" height="60" rx="14" fill="#0c1f18" stroke="url(#em)" stroke-width="1.5" filter="url(#soft)"/>
    <rect x="62" y="108" width="28" height="28" rx="9" fill="#10271d" stroke="#6ee7b7" stroke-width="1.5"/>
    <circle cx="71" cy="121" r="2.3" fill="#6ee7b7"/><circle cx="81" cy="121" r="2.3" fill="#6ee7b7"/><path d="M70,129 h12" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="104" y="120" class="h" font-size="14" fill="#eafff6">Today&#8217;s assistant</text>
    <text x="104" y="138" class="b" font-size="11.5" fill="#86b6a1">connected now</text>
  </g>
  <!-- alternatives -->
  <g opacity="0.62">
    <rect x="44" y="164" width="232" height="48" rx="13" fill="#131a16" stroke="#26302a"/>
    <rect x="62" y="176" width="24" height="24" rx="8" fill="none" stroke="#7e8c84" stroke-width="1.4"/>
    <text x="100" y="193" class="lbl" font-size="13" fill="#b6c2bb">A newer one next year</text>
  </g>
  <g opacity="0.62">
    <rect x="44" y="220" width="232" height="48" rx="13" fill="#131a16" stroke="#26302a"/>
    <rect x="62" y="232" width="24" height="24" rx="8" fill="none" stroke="#7e8c84" stroke-width="1.4"/>
    <text x="100" y="249" class="lbl" font-size="13" fill="#b6c2bb">A private one on your laptop</text>
  </g>
  <!-- swap note -->
  <g>
    <path d="M70,294 a10,10 0 1 1 4,8" fill="none" stroke="#6ee7b7" stroke-width="1.5"/><path d="M68,286 l2,8 l8,-3" fill="none" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="92" y="300" class="lbl" font-size="13" fill="#7ee9bd">Swap whenever you like</text>
  </g>

  <!-- connector: the assistant remembers you -->
  <g stroke="#2c4a3d" stroke-width="1.6" fill="none">
    <path d="M276,122 C360,122 360,150 452,160"/>
  </g>
  <text x="364" y="138" text-anchor="middle" class="b" font-size="12" fill="#86b6a1">remembers you</text>

  <!-- RIGHT: the memory, kept in your space -->
  <ellipse cx="616" cy="218" rx="200" ry="150" fill="url(#emglow)"/>
  <rect x="452" y="92" width="344" height="252" rx="18" fill="#0c1f18" stroke="url(#em)" stroke-width="1.6" filter="url(#soft)"/>
  <rect x="452.5" y="92.5" width="6" height="251" rx="3" fill="url(#em)"/>
  <g>
    <path d="M488,124 l12,-10 l12,10 v13 a1.6,1.6 0 0 1 -1.6,1.6 h-20.8 a1.6,1.6 0 0 1 -1.6,-1.6 z" fill="none" stroke="#6ee7b7" stroke-width="1.6"/>
    <text x="524" y="126" class="lbl" font-size="11.5" letter-spacing="0.4" fill="#7ee9bd">Kept in your space</text>
  </g>
  <text x="480" y="160" class="h" font-size="16.5" fill="#eafff6">What it knows about you</text>

  <g>
    <circle cx="488" cy="192" r="8" fill="#10271d" stroke="#6ee7b7" stroke-width="1.4"/><path d="M484,192 l3,3 l5,-6" fill="none" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="508" y="197" class="b" font-size="13.5" fill="#d2e8df">You prefer short, direct answers</text>
  </g>
  <g>
    <circle cx="488" cy="228" r="8" fill="#10271d" stroke="#6ee7b7" stroke-width="1.4"/><path d="M484,228 l3,3 l5,-6" fill="none" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="508" y="233" class="b" font-size="13.5" fill="#d2e8df">Peanut allergy &#8212; always flag it</text>
  </g>
  <g>
    <circle cx="488" cy="264" r="8" fill="#10271d" stroke="#6ee7b7" stroke-width="1.4"/><path d="M484,264 l3,3 l5,-6" fill="none" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="508" y="269" class="b" font-size="13.5" fill="#d2e8df">Writing a sci-fi novel on weekends</text>
  </g>
  <g>
    <circle cx="488" cy="300" r="8" fill="#10271d" stroke="#6ee7b7" stroke-width="1.4"/><path d="M484,300 l3,3 l5,-6" fill="none" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="508" y="305" class="b" font-size="13.5" fill="#d2e8df">Calls Mum on Sundays</text>
  </g>

  <text x="420" y="392" text-anchor="middle" class="h" font-size="14.5" fill="#cfd8d2">Switch assistants anytime &#8212; it still knows you.</text>
</svg>
